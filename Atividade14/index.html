<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maiúsculas e Minúsculas</title>
</head>

<body>

    <h2>Transformar Texto</h2>

    <input type="text" id="text">

    <br><br>

    <input type="radio" name="option" onclick="toUpper()">
    Maiúsculas

    <br>

    <input type="radio" name="option" onclick="toLower()">
    Minúsculas

    <script src="script.js"></script>

</body>

</html>
